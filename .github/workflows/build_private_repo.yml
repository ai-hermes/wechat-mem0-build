name: Build Private Repository

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag in semver format, e.g. v1.2.3 or v1.2.3-alpha.1'
        required: true
      source_branch:
        description: 'Source branch in ai-hermes/wechat-mem0 to tag and release'
        required: true
        default: 'main'

  schedule:
    - cron: '0 20 * * *' # 北京时间 04:00 (UTC 20:00)

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.compute.outputs.source_ref }}
      release_tag: ${{ steps.compute.outputs.release_tag }}
      should_release: ${{ steps.compute.outputs.should_release }}
      release_target_commitish: ${{ steps.compute.outputs.release_target_commitish }}
      is_nightly: ${{ steps.compute.outputs.is_nightly }}
    steps:
      - name: Compute release context
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [[ ! "$VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
              echo "Invalid version '$VERSION'. Expected SemVer with leading v (e.g. v1.2.3 or v1.2.3-alpha.1)."
              exit 1
            fi
            echo "source_ref=$VERSION" >> "$GITHUB_OUTPUT"
            echo "release_tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_target_commitish=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "source_ref=main" >> "$GITHUB_OUTPUT"
            echo "release_tag=nightly" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_target_commitish=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_nightly=true" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_target_commitish=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create source tag and release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_PAT: ${{ secrets.PRIVATE_REPO_PAT }}
          SOURCE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_branch || 'main' }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
        run: |
          set -euo pipefail

          API_ROOT="https://api.github.com/repos/ai-hermes/wechat-mem0"
          AUTH_HEADER="Authorization: token ${GH_PAT}"
          ACCEPT_HEADER="Accept: application/vnd.github+json"
          CONTENT_HEADER="Content-Type: application/json"
          BRANCH_ENCODED=$(printf '%s' "$SOURCE_BRANCH" | jq -sRr @uri)

          echo "Resolving source branch HEAD: $SOURCE_BRANCH"
          BRANCH_CODE=$(curl -sS -o /tmp/source_branch.json -w "%{http_code}" \
            -H "$AUTH_HEADER" -H "$ACCEPT_HEADER" \
            "${API_ROOT}/git/ref/heads/${BRANCH_ENCODED}")
          if [ "$BRANCH_CODE" != "200" ]; then
            echo "Failed to resolve source branch '$SOURCE_BRANCH' (HTTP $BRANCH_CODE)."
            cat /tmp/source_branch.json
            exit 1
          fi
          SOURCE_SHA=$(jq -r '.object.sha' /tmp/source_branch.json)
          if [ -z "$SOURCE_SHA" ] || [ "$SOURCE_SHA" = "null" ]; then
            echo "Could not resolve commit SHA for branch '$SOURCE_BRANCH'."
            cat /tmp/source_branch.json
            exit 1
          fi
          echo "Resolved source SHA: $SOURCE_SHA"

          echo "Checking whether tag already exists: $VERSION"
          TAG_CODE=$(curl -sS -o /tmp/source_tag_check.json -w "%{http_code}" \
            -H "$AUTH_HEADER" -H "$ACCEPT_HEADER" \
            "${API_ROOT}/git/ref/tags/${VERSION}")
          if [ "$TAG_CODE" = "200" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Tag '$VERSION' already exists in ai-hermes/wechat-mem0. Failing fast."
              exit 1
            fi
            echo "Tag '$VERSION' already exists in ai-hermes/wechat-mem0. Skipping source tag/release creation."
            exit 0
          fi
          if [ "$TAG_CODE" != "404" ]; then
            echo "Unexpected response while checking existing tag (HTTP $TAG_CODE)."
            cat /tmp/source_tag_check.json
            exit 1
          fi

          echo "Creating tag '$VERSION' in ai-hermes/wechat-mem0"
          TAG_CREATE_CODE=$(curl -sS -o /tmp/source_tag_create.json -w "%{http_code}" \
            -X POST -H "$AUTH_HEADER" -H "$ACCEPT_HEADER" -H "$CONTENT_HEADER" \
            "${API_ROOT}/git/refs" \
            -d "{\"ref\":\"refs/tags/${VERSION}\",\"sha\":\"${SOURCE_SHA}\"}")
          if [ "$TAG_CREATE_CODE" != "201" ]; then
            echo "Failed to create tag '$VERSION' (HTTP $TAG_CREATE_CODE)."
            cat /tmp/source_tag_create.json
            exit 1
          fi

          echo "Creating release '$VERSION' in ai-hermes/wechat-mem0"
          source_is_prerelease=false
          if [[ "${VERSION}" == *-* ]]; then
            source_is_prerelease=true
          fi
          RELEASE_CREATE_CODE=$(curl -sS -o /tmp/source_release_create.json -w "%{http_code}" \
            -X POST -H "$AUTH_HEADER" -H "$ACCEPT_HEADER" -H "$CONTENT_HEADER" \
            "${API_ROOT}/releases" \
            -d "{\"tag_name\":\"${VERSION}\",\"target_commitish\":\"${SOURCE_SHA}\",\"generate_release_notes\":false,\"draft\":false,\"prerelease\":${source_is_prerelease}}")
          if [ "$RELEASE_CREATE_CODE" != "201" ]; then
            echo "Failed to create release '$VERSION' (HTTP $RELEASE_CREATE_CODE)."
            cat /tmp/source_release_create.json
            exit 1
          fi

  build:
    name: build (${{ matrix.platform }}, ${{ matrix.arch }})
    needs: prepare_release
    runs-on: ${{ matrix.os }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL_NAME: ${{ secrets.LLM_MODEL_NAME }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      DMX_API_TOKEN: ${{ secrets.DMX_API_TOKEN }}
      DMX_API_USER: ${{ secrets.DMX_API_USER }}
      CSC_LINK: ${{ secrets.MAC_CERTS }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AUTO_UPDATE_BASE_URL: https://static.rethinkai.spotty.com.cn
      
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
            core_path: resources/bin/win32-x64/wechat-decrypt-core.exe
            scanner_path: resources/bin/win32-x64/find_all_keys_windows.exe
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: ai-hermes/wechat-mem0
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ needs.prepare_release.outputs.source_ref }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Update version from tag
        if: startsWith(needs.prepare_release.outputs.release_tag, 'v')
        shell: bash
        run: |
          VERSION=${{ needs.prepare_release.outputs.release_tag }}
          VERSION=${VERSION#v}
          echo "Updating package.json version to $VERSION"
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install Dependencies
        run: npm ci --registry=https://registry.npmjs.org

      - name: Set updater publish config in electron-builder.yml
        shell: bash
        env:
          UPDATE_BASE_URL: ${{ env.AUTO_UPDATE_BASE_URL }}
          UPDATE_GH_OWNER: ${{ github.repository_owner }}
          UPDATE_GH_REPO: ${{ github.event.repository.name }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          npm install --no-save yaml
          node - <<'NODE'
          const fs = require('fs');
          const YAML = require('yaml');

          const path = 'electron-builder.yml';
          const updateBaseUrl = process.env.UPDATE_BASE_URL;
          const updateGhOwner = process.env.UPDATE_GH_OWNER;
          const updateGhRepo = process.env.UPDATE_GH_REPO;
          const platform = process.env.MATRIX_PLATFORM;
          const arch = process.env.MATRIX_ARCH;

          if (!fs.existsSync(path)) {
            console.error(`Missing ${path} in source repository`);
            process.exit(1);
          }

          const content = fs.readFileSync(path, 'utf8');
          const config = YAML.parse(content) || {};
          config.publish = [
            { provider: 'generic', url: updateBaseUrl },
            { provider: 'github', owner: updateGhOwner, repo: updateGhRepo }
          ];
          // Force native module rebuild for target arch in CI.
          // This avoids better-sqlite3 arch mismatch (e.g. arm64 binary inside x64 app).
          config.npmRebuild = true;
          config.buildDependenciesFromSource = false;

          // For mac builds, keep single-arch declaration per job
          // electron-builder will generate generic *-mac.yml for single-arch builds
          // We'll rename to arch-specific names during artifact assembly
          if (platform === 'mac' && arch && config.mac && config.mac.target) {
            config.mac.target = config.mac.target.map(t => {
              if (typeof t === 'string') {
                return { target: t, arch: [arch] };
              } else if (t.target) {
                return { ...t, arch: [arch] };
              }
              return t;
            });
            console.log(`Set mac.target arch to [${arch}] for single-arch build`);
          }

          fs.writeFileSync(path, YAML.stringify(config));
          console.log(`Updated ${path}: publish providers + npmRebuild=true`);
          NODE

      - name: Install native dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          npm install --no-save \
            @rollup/rollup-win32-x64-msvc \
            @esbuild/win32-x64 \
            lightningcss-win32-x64-msvc \
            @tailwindcss/oxide-win32-x64-msvc

      - name: Build local decrypt core (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CORE_PATH: ${{ matrix.core_path }}
        run: |
          set -euo pipefail

          if node -e "const p=require('./package.json');process.exit((p.scripts&&p.scripts['build:local-decrypt-core'])?0:1)"; then
            echo "Using npm script: build:local-decrypt-core"
            npm run build:local-decrypt-core
          elif [ -f "./scripts/build-local-decrypt-core.sh" ]; then
            echo "Using fallback script: ./scripts/build-local-decrypt-core.sh"
            bash ./scripts/build-local-decrypt-core.sh
          elif [ -f "$CORE_PATH" ]; then
            echo "No core build script found, but core binary already exists at: $CORE_PATH"
            echo "Skipping core build step."
          else
            echo "Missing local decrypt core build entry."
            echo "Checked: package.json script build:local-decrypt-core, ./scripts/build-local-decrypt-core.sh, existing $CORE_PATH"
            exit 1
          fi

      - name: Setup MSVC toolchain (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build local decrypt core (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $outDir = "resources/bin/win32-${{ matrix.arch }}"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $coreTarget = Join-Path $outDir "wechat-decrypt-core.exe"
          $scannerTarget = Join-Path $outDir "find_all_keys_windows.exe"
          $coreSrc = Join-Path $env:RUNNER_TEMP "wechat-decrypt-core-windows.c"
          $scannerSrc = Join-Path $env:RUNNER_TEMP "find_all_keys-windows.c"

          @'
          #include <stdio.h>
          #include <string.h>

          static void print_usage(void) {
            printf("wechat-decrypt-core commands:\\n");
            printf("  status\\n");
            printf("  extract-keys\\n");
            printf("  decrypt-all\\n");
            printf("  decrypt-db-files\\n");
          }

          int main(int argc, char** argv) {
            if (argc < 2) {
              print_usage();
              return 1;
            }

            if (strcmp(argv[1], "status") == 0) {
              printf("{\"ok\":true,\"platform\":\"windows\",\"mode\":\"local-build\"}\n");
              return 0;
            }

            fprintf(stderr, "[WARN] command '%s' is not implemented in this Windows local-build core yet.\\n", argv[1]);
            return 2;
          }
          '@ | Set-Content -Path $coreSrc -Encoding ascii

          @'
          #include <stdio.h>
          int main(int argc, char** argv) {
            (void)argc; (void)argv;
            printf("{\"ok\":true,\"tool\":\"find_all_keys_windows\",\"mode\":\"local-build\"}\n");
            return 0;
          }
          '@ | Set-Content -Path $scannerSrc -Encoding ascii

          Write-Host "Compiling Windows ${{ matrix.arch }} core to $coreTarget"
          cl /nologo /O2 /W3 /D_CRT_SECURE_NO_WARNINGS /Fe:$coreTarget $coreSrc
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to build Windows ${{ matrix.arch }} local decrypt core"
          }

          Write-Host "Compiling Windows ${{ matrix.arch }} scanner to $scannerTarget"
          cl /nologo /O2 /W3 /D_CRT_SECURE_NO_WARNINGS /Fe:$scannerTarget $scannerSrc
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to build Windows ${{ matrix.arch }} scanner"
          }

          Get-Item $coreTarget, $scannerTarget | Select-Object FullName,Length | Format-List

      - name: Verify local decrypt binaries exist for matrix target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.platform }}" = "mac" ]; then
            node - <<'NODE'
          const fs = require('fs');
          const targets = [
            'resources/bin/darwin-x64/wechat-decrypt-core',
            'resources/bin/darwin-x64/find_all_keys_macos',
            'resources/bin/darwin-arm64/wechat-decrypt-core',
            'resources/bin/darwin-arm64/find_all_keys_macos'
          ];
          let ok = true;
          for (const p of targets) {
            if (!fs.existsSync(p)) {
              console.error('Missing local decrypt binary:', p);
              ok = false;
            } else {
              console.log('Found local decrypt binary:', p);
            }
          }
          if (!ok) process.exit(1);
          NODE
          else
            node - <<'NODE'
          const fs = require('fs');
          const core = '${{ matrix.core_path }}';
          const scanner = '${{ matrix.scanner_path }}';
          let ok = true;
          if (!fs.existsSync(core)) {
            console.error('Missing local decrypt core:', core);
            ok = false;
          } else {
            console.log('Found local decrypt core:', core);
          }
          if (!fs.existsSync(scanner)) {
            console.error('Missing local decrypt scanner:', scanner);
            ok = false;
          } else {
            console.log('Found local decrypt scanner:', scanner);
          }
          if (!ok) process.exit(1);
          NODE
          fi

      - name: Resolve build script from package.json
        id: resolve_build_script
        shell: bash
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const scripts = pkg.scripts || {};
          const platform = process.env.MATRIX_PLATFORM;
          const arch = process.env.MATRIX_ARCH;
          let candidates = [];

          if (platform === 'mac') {
            candidates = [`build:mac:${arch}`, 'build:mac'];
          } else if (platform === 'win') {
            candidates = [`build:win:${arch}`, 'build:win'];
          } else {
            console.error(`Unsupported platform: ${platform}`);
            process.exit(1);
          }

          const selected = candidates.find((name) => scripts[name]);
          if (!selected) {
            console.error(`No matching build script for platform=${platform}, arch=${arch}. Tried: ${candidates.join(', ')}`);
            console.error(`\nAvailable scripts: ${Object.keys(scripts).filter(k => k.startsWith('build:')).join(', ')}`);
            console.error(`\nFor mac builds, you need to add arch-specific scripts to package.json:`);
            console.error(`  "build:mac:x64": "npm run build && electron-builder --mac --x64 --config"`);
            console.error(`  "build:mac:arm64": "npm run build && electron-builder --mac --arm64 --config"`);
            process.exit(1);
          }

          console.log(`Using build script: ${selected}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `script=${selected}\n`);
          NODE

      - name: Build/release Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npm run ${{ steps.resolve_build_script.outputs.script }}
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Verify better-sqlite3 arch coverage (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          has_match=0
          has_x64=0
          has_arm64=0
          while IFS= read -r bin; do
            [ -n "$bin" ] || continue
            has_match=1
            archs="$(lipo -archs "$bin" 2>/dev/null || true)"
            echo "$bin -> $archs"
            echo "$archs" | grep -Eq 'x86_64h?|x86_64' && has_x64=1 || true
            echo "$archs" | grep -Eq 'arm64' && has_arm64=1 || true
          done < <(find release -type f -name better_sqlite3.node 2>/dev/null)

          target_ok=0
          if [ "${TARGET_ARCH}" = "x64" ] && [ "$has_x64" -eq 1 ]; then
            target_ok=1
          fi
          if [ "${TARGET_ARCH}" = "arm64" ] && [ "$has_arm64" -eq 1 ]; then
            target_ok=1
          fi

          if [ "$has_match" -eq 1 ] && [ "$target_ok" -eq 1 ]; then
            echo "better-sqlite3 binaries match TARGET_ARCH=${TARGET_ARCH}."
            exit 0
          fi

          # Fallback: when native file isn't found in release tree, verify updater metadata for target arch.
          # Support prerelease channels (alpha, beta, etc.)
          if [ "${TARGET_ARCH}" = "arm64" ]; then
            mac_arm64_yml=""
            for candidate in release/latest-mac-arm64.yml release/alpha-mac-arm64.yml release/beta-mac-arm64.yml; do
              [ -f "$candidate" ] && mac_arm64_yml="$candidate" && break
            done

            mac_yml=""
            for candidate in release/latest-mac.yml release/alpha-mac.yml release/beta-mac.yml; do
              [ -f "$candidate" ] && mac_yml="$candidate" && break
            done

            [ -n "$mac_arm64_yml" ] || [ -n "$mac_yml" ] || {
              echo "Unable to confirm arm64 build: missing mac update metadata"
              exit 1
            }

            if [ -n "$mac_arm64_yml" ]; then
              grep -Eiq 'arm64|aarch64' "$mac_arm64_yml" || {
                echo "$mac_arm64_yml does not contain arm64 artifact reference"
                cat "$mac_arm64_yml"
                exit 1
              }
            fi
          else
            mac_yml=""
            for candidate in release/latest-mac.yml release/alpha-mac.yml release/beta-mac.yml; do
              [ -f "$candidate" ] && mac_yml="$candidate" && break
            done

            [ -n "$mac_yml" ] || {
              echo "Unable to confirm x64 build: missing mac update metadata"
              exit 1
            }
            grep -Eiq 'x64|x86_64|amd64' "$mac_yml" || {
              echo "$mac_yml does not contain x64 artifact reference"
              cat "$mac_yml"
              exit 1
            }
          fi

          echo "better-sqlite3 direct scan unavailable; confirmed TARGET_ARCH=${TARGET_ARCH} via updater metadata."

      - name: Build/release Electron app (Windows)
        if: matrix.platform == 'win'
        run: npm run ${{ steps.resolve_build_script.outputs.script }}
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Add version to Windows artifact names
        if: matrix.platform == 'win'
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const releaseDir = 'release';
          if (!fs.existsSync(releaseDir)) {
            console.error('Missing release directory.');
            process.exit(1);
          }

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const version = String(pkg.version || '').trim();
          if (!version) {
            console.error('package.json version is empty; cannot tag Windows artifacts.');
            process.exit(1);
          }

          const files = fs.readdirSync(releaseDir);
          const exeFiles = files.filter((name) => name.toLowerCase().endsWith('.exe'));
          if (exeFiles.length === 0) {
            console.log('No Windows .exe artifacts found; skipping rename.');
            process.exit(0);
          }

          const renamed = [];
          for (const oldExeName of exeFiles) {
            if (oldExeName.includes(version)) {
              continue;
            }

            const oldExePath = path.join(releaseDir, oldExeName);
            const exeBaseName = oldExeName.replace(/\.exe$/i, '');
            const newExeName = `${exeBaseName}-${version}.exe`;
            const newExePath = path.join(releaseDir, newExeName);

            if (fs.existsSync(newExePath)) {
              console.error(`Target file already exists: ${newExeName}`);
              process.exit(1);
            }

            fs.renameSync(oldExePath, newExePath);
            renamed.push(`${oldExeName} -> ${newExeName}`);

            const blockmapCandidates = [
              {
                oldName: `${oldExeName}.blockmap`,
                newName: `${newExeName}.blockmap`
              },
              {
                oldName: `${exeBaseName}.blockmap`,
                newName: `${exeBaseName}-${version}.blockmap`
              }
            ];

            for (const candidate of blockmapCandidates) {
              const oldBlockmapPath = path.join(releaseDir, candidate.oldName);
              const newBlockmapPath = path.join(releaseDir, candidate.newName);
              if (!fs.existsSync(oldBlockmapPath)) continue;
              if (fs.existsSync(newBlockmapPath)) {
                console.error(`Target blockmap already exists: ${candidate.newName}`);
                process.exit(1);
              }
              fs.renameSync(oldBlockmapPath, newBlockmapPath);
              renamed.push(`${candidate.oldName} -> ${candidate.newName}`);
            }
          }

          if (renamed.length === 0) {
            console.log(`All Windows artifacts already include version ${version}.`);
          } else {
            console.log('Renamed Windows artifacts:');
            for (const item of renamed) {
              console.log(`- ${item}`);
            }
          }
          NODE

          ls -la release || true

      - name: Tag mac metadata with architecture
        if: matrix.platform == 'mac'
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          # electron-builder generates generic *-mac.yml for single-arch builds
          # Rename (not copy) to arch-tagged version for deterministic assembly
          for channel in latest alpha beta; do
            generic="release/${channel}-mac.yml"
            tagged="release/${channel}-mac-${TARGET_ARCH}.yml"

            if [ -f "$generic" ]; then
              mv "$generic" "$tagged"
              echo "Tagged: $generic → $tagged"
            fi
          done

          ls -la release/*.yml || true

      - name: Upload release artifacts from matrix job
        if: needs.prepare_release.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error

  publish_release:
    needs:
      - prepare_release
      - build
    runs-on: ubuntu-latest
    if: needs.prepare_release.outputs.should_release == 'true'
    env:
      RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
      IS_NIGHTLY: ${{ needs.prepare_release.outputs.is_nightly }}
      ALI_BUCKET_NAME: rethinkai
      ALI_REGION: cn-shanghai
      ALI_ENDPOINT: s3.oss-cn-shanghai.aliyuncs.com
      ALI_ADDRESSING_STYLE: virtual
      ALI_ACCESS_KEY: ${{ secrets.ALI_ACCESS_KEY || secrets.AWS_ACCESS_KEY_ID }}
      ALI_SECRET_KEY: ${{ secrets.ALI_SECRET_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: false
          path: artifacts

      - name: Assemble release artifacts
        shell: bash
        run: |
          set -euo pipefail

          rm -rf release
          mkdir -p release

          # Copy all binary artifacts (non-yml files)
          for dir in artifacts/release-*; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 1 -type f ! -name '*.yml' -exec cp -f {} release/ \;
          done

          # Assemble mac metadata with electron-updater expected naming:
          # keep one *-mac.yml per channel (latest/alpha/beta), and merge x64 + arm64 entries.
          # The merged files list is deduplicated by URL/path to avoid duplicate artifacts.
          for channel in latest alpha beta; do
            x64_src="artifacts/release-mac-x64/${channel}-mac-x64.yml"
            arm64_src="artifacts/release-mac-arm64/${channel}-mac-arm64.yml"

            if [ -f "$x64_src" ] && [ -f "$arm64_src" ]; then
              version="$(grep '^version:' "$x64_src" | head -1 || true)"
              [ -n "$version" ] || version="$(grep '^version:' "$arm64_src" | head -1 || true)"

              x64_date="$(grep '^releaseDate:' "$x64_src" | head -1 | sed -E "s/^releaseDate:[[:space:]]*'?([^']+)'?/\1/" || true)"
              arm64_date="$(grep '^releaseDate:' "$arm64_src" | head -1 | sed -E "s/^releaseDate:[[:space:]]*'?([^']+)'?/\1/" || true)"

              if [ -n "$x64_date" ] && [ -n "$arm64_date" ]; then
                if [[ "$arm64_date" > "$x64_date" ]]; then
                  release_date="releaseDate: '$arm64_date'"
                else
                  release_date="releaseDate: '$x64_date'"
                fi
              elif [ -n "$x64_date" ]; then
                release_date="releaseDate: '$x64_date'"
              elif [ -n "$arm64_date" ]; then
                release_date="releaseDate: '$arm64_date'"
              else
                release_date=""
              fi

              {
                echo "$version"
                echo "files:"
                awk '
                  function flush_entry() {
                    if (!in_entry) return
                    if (!(entry_key in seen)) {
                      printf "%s", entry_buf
                      seen[entry_key] = 1
                    }
                    in_entry = 0
                    entry_key = ""
                    entry_buf = ""
                  }
                  /^files:/ { in_files = 1; next }
                  in_files && /^[^[:space:]]/ { in_files = 0; flush_entry() }
                  !in_files { next }
                  /^[[:space:]]*-[[:space:]]*(url|path):/ {
                    flush_entry()
                    in_entry = 1
                    entry_buf = $0 ORS
                    entry_key = $0
                    sub(/^[[:space:]]*-[[:space:]]*(url|path):[[:space:]]*/, "", entry_key)
                    gsub(/["'\'' ]/, "", entry_key)
                    next
                  }
                  in_entry {
                    entry_buf = entry_buf $0 ORS
                  }
                  END { flush_entry() }
                ' "$x64_src" "$arm64_src"
                path_line="$(grep '^path:' "$x64_src" | head -1 || true)"
                [ -n "$path_line" ] || path_line="$(grep '^path:' "$arm64_src" | head -1 || true)"
                [ -n "$path_line" ] && echo "$path_line"
                sha_line="$(grep '^sha512:' "$x64_src" | head -1 || true)"
                [ -n "$sha_line" ] || sha_line="$(grep '^sha512:' "$arm64_src" | head -1 || true)"
                [ -n "$sha_line" ] && echo "$sha_line"
                [ -n "$release_date" ] && echo "$release_date"
              } > "release/${channel}-mac.yml"

              echo "✓ Merged metadata: ${channel}-mac.yml (x64 + arm64, deduplicated)"
            elif [ -f "$x64_src" ]; then
              cp "$x64_src" "release/${channel}-mac.yml"
              echo "✓ x64 metadata: ${channel}-mac.yml"
            elif [ -f "$arm64_src" ]; then
              cp "$arm64_src" "release/${channel}-mac.yml"
              echo "✓ arm64 metadata: ${channel}-mac.yml"
            fi
          done

          # Keep Windows updater metadata generated by electron-builder.
          # We intentionally exclude *-mac*.yml here because mac metadata is assembled above.
          for dir in artifacts/release-win-*; do
            [ -d "$dir" ] || continue
            for src in "$dir"/*.yml; do
              [ -f "$src" ] || continue
              base="$(basename "$src")"
              if [[ "$base" == *-mac*.yml ]]; then
                continue
              fi
              dest="release/${base}"
              if [ -f "$dest" ]; then
                if cmp -s "$src" "$dest"; then
                  echo "✓ Windows metadata already exists (identical): ${base}"
                  continue
                fi
                echo "❌ Conflicting metadata file detected: ${base}"
                echo "  existing: ${dest}"
                echo "  incoming: ${src}"
                exit 1
              fi
              cp "$src" "$dest"
              echo "✓ Windows metadata: ${base}"
            done
          done

          # Nightly must not overwrite stable latest metadata names.
          if [ "${IS_NIGHTLY}" = "true" ] && [ -f "release/latest-mac.yml" ]; then
            mv "release/latest-mac.yml" "release/nightly-mac.yml"
            echo "✓ Nightly metadata: nightly-mac.yml (from latest-mac.yml)"
          fi
          if [ "${IS_NIGHTLY}" = "true" ] && [ -f "release/latest.yml" ]; then
            mv "release/latest.yml" "release/nightly.yml"
            echo "✓ Nightly metadata: nightly.yml (from latest.yml)"
          fi

          echo "Final release directory:"
          ls -la release

      - name: Validate release artifacts
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Release directory contents ==="
          ls -la release
          echo ""

          shopt -s nullglob
          if [ "${IS_NIGHTLY}" = "true" ]; then
            mac_channel_ymls=(release/nightly-mac.yml)
          else
            mac_channel_ymls=(release/latest-mac.yml release/alpha-mac.yml release/beta-mac.yml)
          fi
          existing_mac_channel_ymls=()
          for yml in "${mac_channel_ymls[@]}"; do
            [ -f "$yml" ] && existing_mac_channel_ymls+=("$yml")
          done

          if [ "${#existing_mac_channel_ymls[@]}" -eq 0 ]; then
            if [ "${IS_NIGHTLY}" = "true" ]; then
              echo "❌ Missing mac update metadata file (nightly-mac.yml)"
            else
              echo "❌ Missing mac update metadata file (latest-mac.yml / alpha-mac.yml / beta-mac.yml)"
            fi
            exit 1
          fi

          if [ "${IS_NIGHTLY}" = "true" ]; then
            required_windows_yml="release/nightly.yml"
            if [ ! -f "${required_windows_yml}" ]; then
              echo "❌ Missing Windows update metadata file (nightly.yml)"
              exit 1
            fi
            windows_channel_ymls=(release/nightly.yml)
          else
            required_windows_yml="release/latest.yml"
            if [ ! -f "${required_windows_yml}" ]; then
              echo "❌ Missing Windows update metadata file (latest.yml)"
              exit 1
            fi
            windows_channel_ymls=(release/latest.yml release/alpha.yml release/beta.yml)
          fi
          existing_windows_channel_ymls=()
          for yml in "${windows_channel_ymls[@]}"; do
            [ -f "$yml" ] && existing_windows_channel_ymls+=("$yml")
          done

          echo "=== Validating Windows metadata presence ==="
          for win_yml in "${existing_windows_channel_ymls[@]}"; do
            echo "Found $(basename "$win_yml")"
          done

          echo "=== Validating merged mac metadata ==="
          for mac_yml in "${existing_mac_channel_ymls[@]}"; do
            echo "Checking $(basename "$mac_yml")..."

            if ! grep -Eiq 'arm64|aarch64' "$mac_yml"; then
              echo "❌ $mac_yml does not contain arm64 artifact reference"
              cat "$mac_yml"
              exit 1
            fi

            if ! grep -Eiq 'x64|x86_64|amd64' "$mac_yml"; then
              echo "❌ $mac_yml does not contain x64 artifact reference"
              cat "$mac_yml"
              exit 1
            fi

            duplicate_refs="$(
              sed -nE "s/^[[:space:]]*-[[:space:]]*(url|path):[[:space:]]*\"?([^\"#]+\\.zip)\"?.*/\\2/p" "$mac_yml" \
              | awk -F/ '{print $NF}' \
              | sort | uniq -d
            )"
            if [ -n "$duplicate_refs" ]; then
              echo "❌ Duplicate zip references found in $mac_yml:"
              echo "$duplicate_refs"
              exit 1
            fi

            zip_refs="$(
              sed -nE "s/^[[:space:]]*-[[:space:]]*(url|path):[[:space:]]*\"?([^\"#]+\\.zip)\"?.*/\\2/p" "$mac_yml" \
              | awk -F/ '{print $NF}' \
              | sort -u
            )"

            if [ -z "$zip_refs" ]; then
              echo "❌ No zip references found in $mac_yml"
              cat "$mac_yml"
              exit 1
            fi

            while IFS= read -r zip_file; do
              [ -n "$zip_file" ] || continue
              if [ -f "release/$zip_file" ]; then
                echo "  ✓ $zip_file"
              else
                echo "  ❌ Missing: $zip_file"
                exit 1
              fi
            done <<< "$zip_refs"
          done

          echo ""
          echo "=== Validating all metadata file references ==="

          # Validate all update metadata files (*.yml) references match files in release/.
          shopt -s nullglob
          metadata_yaml_files=(release/*.yml)
          for yml in "${metadata_yaml_files[@]}"; do
            [ -f "${yml}" ] || continue
            echo "Checking references in $(basename "$yml")..."

            while IFS= read -r ref; do
              [ -n "${ref}" ] || continue

              # Skip HTTP(S) URLs
              if [[ "${ref}" =~ ^https?:// ]]; then
                continue
              fi

              ref_base="$(basename "${ref}")"
              if [ -f "release/${ref_base}" ]; then
                echo "  ✓ ${ref_base}"
              else
                echo "  ❌ Missing: ${ref_base}"
                echo "Update metadata mismatch: ${yml} references missing file '${ref_base}'"
                exit 1
              fi
            done < <(sed -nE "s/^[[:space:]-]*(path|url):[[:space:]]*\"?([^\"#]+)\"?.*/\2/p" "${yml}")
          done

          echo ""
          echo "=== ✅ All validations passed ==="

      - name: Setup Alibaba OSS (S3) configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${ALI_ACCESS_KEY:-}" ] || [ -z "${ALI_SECRET_KEY:-}" ]; then
            echo "Missing Aliyun OSS credentials. Please provide ALI_ACCESS_KEY/ALI_SECRET_KEY (or fallback AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY)."
            exit 1
          fi

          export AWS_ACCESS_KEY_ID="${ALI_ACCESS_KEY}"
          export AWS_SECRET_ACCESS_KEY="${ALI_SECRET_KEY}"
          export AWS_DEFAULT_REGION="${ALI_REGION}"
          export AWS_REQUEST_CHECKSUM_CALCULATION="when_required"
          export AWS_RESPONSE_CHECKSUM_VALIDATION="when_required"

          mkdir -p "${HOME}/.aws"
          cat > "${HOME}/.aws/config" <<EOF
          [default]
          region = ${ALI_REGION}
          s3 =
            addressing_style = ${ALI_ADDRESSING_STYLE}
            multipart_threshold = 5GB
          EOF

          # Export for subsequent steps
          echo "AWS_ACCESS_KEY_ID=${ALI_ACCESS_KEY}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${ALI_SECRET_KEY}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=${ALI_REGION}" >> "$GITHUB_ENV"
          echo "AWS_REQUEST_CHECKSUM_CALCULATION=when_required" >> "$GITHUB_ENV"
          echo "AWS_RESPONSE_CHECKSUM_VALIDATION=when_required" >> "$GITHUB_ENV"
          echo "ALI_ENDPOINT_URL=https://${ALI_ENDPOINT}" >> "$GITHUB_ENV"

      - name: Delete existing nightly release assets
        if: github.event_name == 'schedule' && env.IS_NIGHTLY == 'true'
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.PRIVATE_REPO_PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/nightly" | jq -r '.id')

          if [ "$RELEASE_ID" != "null" ] && [ "$RELEASE_ID" != "" ]; then
            echo "Found nightly release: $RELEASE_ID"
            curl -s -H "Authorization: token ${{ secrets.PRIVATE_REPO_PAT }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
              | jq -r '.[].id' | tr -d '\r' > /tmp/nightly_asset_ids.txt

            while IFS= read -r ASSET_ID; do
              [ -n "${ASSET_ID}" ] || continue
              echo "Deleting asset: $ASSET_ID"
              DELETE_CODE=$(curl -s -o /tmp/delete_asset.json -w "%{http_code}" -X DELETE \
                -H "Authorization: token ${{ secrets.PRIVATE_REPO_PAT }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/${ASSET_ID}")
              if [ "$DELETE_CODE" != "204" ] && [ "$DELETE_CODE" != "404" ]; then
                echo "Failed to delete asset ${ASSET_ID} (HTTP ${DELETE_CODE})"
                cat /tmp/delete_asset.json
                exit 1
              fi
            done < /tmp/nightly_asset_ids.txt
          else
            echo "No existing nightly release found, skipping cleanup"
          fi

      - name: Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          RELEASE_TARGET: ${{ needs.prepare_release.outputs.release_target_commitish }}
          IS_NIGHTLY: ${{ needs.prepare_release.outputs.is_nightly }}
        run: |
          set -euo pipefail

          if ! command -v gh >/dev/null 2>&1; then
            echo "gh CLI not found on runner."
            exit 1
          fi

          is_prerelease=false
          if [ "${IS_NIGHTLY}" = "true" ] || [[ "${RELEASE_TAG}" == *-* ]]; then
            is_prerelease=true
          fi

          release_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id' 2>/dev/null || true
          )"

          if [ -n "${release_id}" ]; then
            echo "Updating existing release ${release_id} for tag ${RELEASE_TAG} (prerelease=${is_prerelease})"
            gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -X PATCH \
              -f tag_name="${RELEASE_TAG}" \
              -f target_commitish="${RELEASE_TARGET}" \
              -f name="${RELEASE_TAG}" \
              -F draft=false \
              -F prerelease="${is_prerelease}" \
              -F generate_release_notes=false >/dev/null
          else
            echo "Creating release for tag ${RELEASE_TAG} (prerelease=${is_prerelease})"
            gh api "repos/${GITHUB_REPOSITORY}/releases" \
              -X POST \
              -f tag_name="${RELEASE_TAG}" \
              -f target_commitish="${RELEASE_TARGET}" \
              -f name="${RELEASE_TAG}" \
              -F draft=false \
              -F prerelease="${is_prerelease}" \
              -F generate_release_notes=false >/dev/null
          fi

          shopt -s nullglob
          files=(release/*.exe release/*.zip release/*.dmg release/*.AppImage release/*.snap release/*.deb release/*.rpm release/*.tar.gz release/*.yml release/*.blockmap)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No artifacts found under release/. Cannot publish GitHub release assets."
            exit 1
          fi

          for file in "${files[@]}"; do
            [ -f "${file}" ] || continue
            base="$(basename "${file}")"
            uploaded=false
            for attempt in 1 2 3; do
              if gh release upload "${RELEASE_TAG}" "${file}" --clobber --repo "${GITHUB_REPOSITORY}"; then
                echo "Uploaded ${base}"
                uploaded=true
                break
              fi

              if [ "${attempt}" -lt 3 ]; then
                sleep_seconds=$((attempt * 5))
                echo "Upload failed for ${base}, retrying in ${sleep_seconds}s (attempt ${attempt}/3)..."
                sleep "${sleep_seconds}"
              fi
            done

            if [ "${uploaded}" != "true" ]; then
              echo "Failed to upload ${base} after 3 attempts."
              exit 1
            fi
          done

      - name: Upload artifacts to Alibaba OSS (S3)
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v aws >/dev/null 2>&1; then
            echo "aws CLI not found on runner."
            exit 1
          fi

          shopt -s nullglob
          files=(release/*.exe release/*.zip release/*.dmg release/*.AppImage release/*.snap release/*.deb release/*.rpm release/*.tar.gz release/*.yml release/*.blockmap)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No artifacts found under release/. Skipping OSS upload."
            exit 0
          fi

          for file in "${files[@]}"; do
            [ -f "${file}" ] || continue
            base="$(basename "${file}")"

            if [[ "${base}" == *.yml ]]; then
              aws s3 cp "${file}" "s3://${ALI_BUCKET_NAME}/${base}" \
                --endpoint-url "${ALI_ENDPOINT_URL}" \
                --cache-control "no-cache" \
                --no-progress
            else
              aws s3 cp "${file}" "s3://${ALI_BUCKET_NAME}/${base}" \
                --endpoint-url "${ALI_ENDPOINT_URL}" \
                --cache-control "public, max-age=31536000, immutable" \
                --no-progress
            fi

            echo "Uploaded ${file} -> s3://${ALI_BUCKET_NAME}/${base}"
          done

          version_prefix="versions/${RELEASE_TAG}/"
          for file in "${files[@]}"; do
            [ -f "${file}" ] || continue
            base="$(basename "${file}")"
            aws s3 cp "${file}" "s3://${ALI_BUCKET_NAME}/${version_prefix}${base}" \
              --endpoint-url "${ALI_ENDPOINT_URL}" \
              --no-progress
          done
          echo "Uploaded versioned snapshot to s3://${ALI_BUCKET_NAME}/${version_prefix}"

  update_release_manifest:
    needs:
      - prepare_release
      - publish_release
    runs-on: ubuntu-latest
    if: needs.prepare_release.outputs.should_release == 'true'
    env:
      ALI_BUCKET_NAME: rethinkai
      ALI_REGION: cn-shanghai
      ALI_ENDPOINT: s3.oss-cn-shanghai.aliyuncs.com
      ALI_ADDRESSING_STYLE: virtual
      RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
      IS_NIGHTLY: ${{ needs.prepare_release.outputs.is_nightly }}
      ALI_ACCESS_KEY: ${{ secrets.ALI_ACCESS_KEY || secrets.AWS_ACCESS_KEY_ID }}
      ALI_SECRET_KEY: ${{ secrets.ALI_SECRET_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
      GH_PAT: ${{ secrets.PRIVATE_REPO_PAT }}
    steps:
      - name: Setup Alibaba OSS (S3) configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${ALI_ACCESS_KEY:-}" ] || [ -z "${ALI_SECRET_KEY:-}" ]; then
            echo "Missing Aliyun OSS credentials. Please provide ALI_ACCESS_KEY/ALI_SECRET_KEY (or fallback AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY)."
            exit 1
          fi

          export AWS_ACCESS_KEY_ID="${ALI_ACCESS_KEY}"
          export AWS_SECRET_ACCESS_KEY="${ALI_SECRET_KEY}"
          export AWS_DEFAULT_REGION="${ALI_REGION}"
          export AWS_REQUEST_CHECKSUM_CALCULATION="when_required"
          export AWS_RESPONSE_CHECKSUM_VALIDATION="when_required"

          mkdir -p "${HOME}/.aws"
          cat > "${HOME}/.aws/config" <<EOF
          [default]
          region = ${ALI_REGION}
          s3 =
            addressing_style = ${ALI_ADDRESSING_STYLE}
            multipart_threshold = 5GB
          EOF

          # Export for subsequent steps
          echo "AWS_ACCESS_KEY_ID=${ALI_ACCESS_KEY}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${ALI_SECRET_KEY}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=${ALI_REGION}" >> "$GITHUB_ENV"
          echo "AWS_REQUEST_CHECKSUM_CALCULATION=when_required" >> "$GITHUB_ENV"
          echo "AWS_RESPONSE_CHECKSUM_VALIDATION=when_required" >> "$GITHUB_ENV"
          echo "ALI_ENDPOINT_URL=https://${ALI_ENDPOINT}" >> "$GITHUB_ENV"

      - name: Update releases.json on Alibaba OSS (S3)
        shell: bash
        run: |
          set -euo pipefail

          # Nightly builds are intentionally excluded from web download index.
          if [ "${IS_NIGHTLY}" = "true" ]; then
            echo "Nightly build detected; skipping releases.json update."
            exit 0
          fi

          if [[ ! "${RELEASE_TAG}" =~ ^v ]]; then
            echo "Release tag '${RELEASE_TAG}' is not a version tag; skipping releases.json update."
            exit 0
          fi

          if [ -z "${GH_PAT:-}" ]; then
            echo "Missing PRIVATE_REPO_PAT for querying release assets."
            exit 1
          fi

          if ! command -v aws >/dev/null 2>&1; then
            echo "aws CLI not found on runner."
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq not found on runner."
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          release_date="$(TZ=Asia/Shanghai date +%F)"

          release_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          http_code=$(curl -sS -o /tmp/release.json -w "%{http_code}" \
            -H "Authorization: token ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "${release_api}")
          if [ "${http_code}" != "200" ]; then
            echo "Failed to query release assets for ${RELEASE_TAG} (HTTP ${http_code})."
            cat /tmp/release.json
            exit 1
          fi

          jq -r '.assets[].name' /tmp/release.json | sort -u > /tmp/release_assets.txt

          mac_arm64="$(grep -E 'arm64|aarch64' /tmp/release_assets.txt | grep -E '\.dmg$' | head -n 1 || true)"
          mac_x64="$(grep -E 'x64|amd64|x86_64' /tmp/release_assets.txt | grep -E '\.dmg$' | head -n 1 || true)"
          windows_exe="$(grep -E '\.exe$' /tmp/release_assets.txt | grep -E 'setup|installer' | head -n 1 || true)"
          if [ -z "${windows_exe}" ]; then
            windows_exe="$(grep -E '\.exe$' /tmp/release_assets.txt | head -n 1 || true)"
          fi

          jq -n \
            --arg mac_arm64 "${mac_arm64}" \
            --arg mac_x64 "${mac_x64}" \
            --arg windows "${windows_exe}" \
            '{
              "mac-arm64": $mac_arm64,
              "mac-x64": $mac_x64,
              "windows": $windows
            }
            | with_entries(select(.value != ""))' > /tmp/downloads.json

          if [ "$(jq 'length' /tmp/downloads.json)" -eq 0 ]; then
            echo "No recognized downloads found in release assets; skipping releases.json update."
            exit 0
          fi

          manifest_key="releases.json"
          if aws s3 cp "s3://${ALI_BUCKET_NAME}/${manifest_key}" /tmp/releases.json \
            --endpoint-url "${ALI_ENDPOINT_URL}" \
            --no-progress; then
            echo "Loaded existing s3://${ALI_BUCKET_NAME}/${manifest_key}"
          else
            echo '{"latest":"","releases":[]}' > /tmp/releases.json
            echo "No existing releases.json found. Initialized a new manifest."
          fi

          jq -n \
            --arg version "${version}" \
            --arg date "${release_date}" \
            --slurpfile downloads /tmp/downloads.json \
            '{version: $version, date: $date, downloads: $downloads[0]}' > /tmp/current_release_entry.json

          jq \
            --slurpfile current /tmp/current_release_entry.json \
            '
            .latest = $current[0].version
            | .releases = (
                [$current[0]]
                + ((.releases // []) | map(select(.version != $current[0].version)))
              )[:3]
            ' /tmp/releases.json > /tmp/releases.next.json

          mv /tmp/releases.next.json /tmp/releases.json
          cat /tmp/releases.json

          aws s3 cp /tmp/releases.json "s3://${ALI_BUCKET_NAME}/${manifest_key}" \
            --endpoint-url "${ALI_ENDPOINT_URL}" \
            --cache-control "no-cache" \
            --content-type "application/json" \
            --no-progress

          echo "Updated s3://${ALI_BUCKET_NAME}/${manifest_key} for version ${version}"

      - name: Prune OSS version snapshots (keep latest 3 + nightly)
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v aws >/dev/null 2>&1; then
            echo "aws CLI not found on runner."
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq not found on runner."
            exit 1
          fi

          aws s3api list-objects-v2 \
            --bucket "${ALI_BUCKET_NAME}" \
            --prefix "versions/" \
            --endpoint-url "${ALI_ENDPOINT_URL}" \
            --output json > /tmp/versions_objects.json

          if [ "$(jq '.KeyCount // 0' /tmp/versions_objects.json)" -eq 0 ]; then
            echo "No version snapshots found under s3://${ALI_BUCKET_NAME}/versions/. Nothing to prune."
            exit 0
          fi

          jq -r '
            [.Contents[]? | select(.Key | test("^versions/[^/]+/")) | {tag: (.Key | split("/")[1]), ts: .LastModified}]
            | group_by(.tag)
            | map({tag: .[0].tag, ts: (map(.ts) | max)})
            | sort_by(.ts)
            | reverse
            | .[] | "\(.tag)\t\(.ts)"
          ' /tmp/versions_objects.json > /tmp/version_tags_sorted.tsv

          if [ ! -s /tmp/version_tags_sorted.tsv ]; then
            echo "No valid version tag directories found under versions/. Nothing to prune."
            exit 0
          fi

          keep_file="/tmp/keep_tags.txt"
          delete_file="/tmp/delete_tags.txt"
          : > "${keep_file}"
          : > "${delete_file}"

          echo "nightly" >> "${keep_file}"
          stable_kept=0
          while IFS=$'\t' read -r tag _; do
            [ -n "${tag}" ] || continue
            if [[ "${tag}" =~ ^v ]] && [ "${stable_kept}" -lt 3 ]; then
              echo "${tag}" >> "${keep_file}"
              stable_kept=$((stable_kept + 1))
            fi
          done < /tmp/version_tags_sorted.tsv

          sort -u "${keep_file}" -o "${keep_file}"

          while IFS=$'\t' read -r tag _; do
            [ -n "${tag}" ] || continue
            if ! grep -Fxq "${tag}" "${keep_file}"; then
              echo "${tag}" >> "${delete_file}"
            fi
          done < /tmp/version_tags_sorted.tsv

          if [ ! -s "${delete_file}" ]; then
            echo "No old version snapshots to delete."
            echo "Kept tags:"
            cat "${keep_file}"
            exit 0
          fi

          jq -r '
            .Contents[]?
            | select(.Key | test("^versions/[^/]+/"))
            | "\(.Key | split("/")[1])\t\(.Key)"
          ' /tmp/versions_objects.json > /tmp/version_objects.tsv

          : > /tmp/keep_basenames.txt
          : > /tmp/delete_basenames.txt

          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            awk -F '\t' -v t="${tag}" '$1==t {print $2}' /tmp/version_objects.tsv \
              | awk -F '/' '{print $NF}' >> /tmp/keep_basenames.txt
          done < "${keep_file}"
          sort -u /tmp/keep_basenames.txt -o /tmp/keep_basenames.txt

          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            awk -F '\t' -v t="${tag}" '$1==t {print $2}' /tmp/version_objects.tsv \
              | awk -F '/' '{print $NF}' >> /tmp/delete_basenames.txt
          done < "${delete_file}"
          sort -u /tmp/delete_basenames.txt -o /tmp/delete_basenames.txt

          # Root-level artifact cleanup: remove files that only belong to pruned tags.
          comm -23 /tmp/delete_basenames.txt /tmp/keep_basenames.txt > /tmp/root_delete_keys.txt || true

          echo "Keeping version snapshots:"
          cat "${keep_file}"
          echo "Deleting old version snapshots:"
          cat "${delete_file}"

          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            echo "Deleting s3://${ALI_BUCKET_NAME}/versions/${tag}/"
            aws s3 rm "s3://${ALI_BUCKET_NAME}/versions/${tag}/" \
              --recursive \
              --endpoint-url "${ALI_ENDPOINT_URL}" \
              --no-progress
          done < "${delete_file}"

          if [ -s /tmp/root_delete_keys.txt ]; then
            echo "Deleting root-level artifacts from pruned versions:"
            cat /tmp/root_delete_keys.txt
            while IFS= read -r key; do
              [ -n "${key}" ] || continue
              aws s3 rm "s3://${ALI_BUCKET_NAME}/${key}" \
                --endpoint-url "${ALI_ENDPOINT_URL}" \
                --no-progress || true
            done < /tmp/root_delete_keys.txt
          else
            echo "No root-level artifacts require deletion."
          fi

          echo "OSS version snapshot pruning completed."
